# API文档生成配置

# 模块配置
modules:
  # 模块映射：路径 -> 模块名称
  mapping:
    "ubill-access-api/ubill-order/logic": "order"
    "ubill-access-api/ubill-transaction/logic": "transaction"
    "ubill-access-api/ubill-resource/logic": "resource"
    "ubill-access-api/ubill-surround/logic": "surround"

# API搜索规则
search_rules:
  # API匹配模式（正则表达式）
  function_patterns:
    - 'http\.HandlerFunc\(\s*([a-zA-Z_][a-zA-Z0-9_]*)\s*\)'